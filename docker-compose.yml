services:
  external-gpt-oauth:
    build: .
    container_name: external-gpt-oauth
    env_file:
      - .env
    ports:
      - "127.0.0.1:31835:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.codex-auth:/auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

